[platformio]
default_envs = esp32

;------------------------------------------------------------------------------

; common build options
[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
build_flags =
  -Isrc/config
  -std=gnu++20
  ; -DCORE_DEBUG_LEVEL=3
  -DCORE_DEBUG_LEVEL=0
check_skip_packages = yes
check_tool = cppcheck
check_flags = 
    --enable=all 
    --inconclusive 
    --suppress=badBitmaskCheck 
    --suppress=missingIncludeSystem
    --suppress=missingInclude
    --suppress=unusedFunction
    --suppress=*:*src/pixeler/src/driver/graphics/*
    --suppress=*:*src/config/*
    --suppress=*:*src/pixeler/lib/lua/*
check_severity = low, medium, high

;------------------------------------------------------------------------------

; ESP32 DEV environment
[env:esp32]
board = esp32dev
platform = ${common.platform}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
board_build.partitions = partitions.csv
build_flags =
  ${common.build_flags}
check_skip_packages = ${common.check_skip_packages}
check_tool = ${common.check_tool}
check_flags = ${common.check_flags}
